name: Python CI

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify key package imports
        run: |
          python - <<'PY'
          import numpy
          import pandas
          import scipy
          import sklearn
          import statsmodels
          import openpyxl
          import xlrd
          import pyarrow
          import matplotlib
          import seaborn
          import plotly
          import bokeh
          import altair
          import requests
          import dateutil
          import pytz
          import jupyter
          import ipykernel
          print('All dependency imports succeeded.')
          PY

      - name: Run add.py directly
        run: |
          output=$(printf '2\n3\n' | python add.py)
          echo "$output"
          echo "$output" | grep -F "The sum of 2.0 and 3.0 is 5.0"

      - name: Commit and push aaa.txt
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aaa.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update aaa.txt from GitHub Actions"
            git push
          fi
