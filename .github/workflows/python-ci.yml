name: Python CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify key package imports
        run: |
          python - <<'PY'
          import numpy
          import pandas
          import scipy
          import sklearn
          import statsmodels
          import openpyxl
          import xlrd
          import pyarrow
          import matplotlib
          import seaborn
          import plotly
          import bokeh
          import altair
          import requests
          import dateutil
          import pytz
          import jupyter
          import ipykernel
          print('All dependency imports succeeded.')
          PY

      - name: Run quick function checks
        run: |
          python - <<'PY'
          from add import add
          assert add(2, 3) == 5
          assert add(10, 10) == 20
          assert add(20, 20) == 40
          assert add(1.5, 2.5) == 4.0
          print('Function checks passed.')
          PY

      - name: Run script non-interactively
        run: |
          printf '2\n3\n' | python add.py
